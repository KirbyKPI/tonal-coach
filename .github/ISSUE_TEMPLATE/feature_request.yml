name: Feature request
description: Suggest an improvement that fits the current project scope.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the idea.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or other approaches if you have them.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, metrics, or linked discussion.
