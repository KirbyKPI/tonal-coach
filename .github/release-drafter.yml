name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
no-changes-template: "- No user-facing changes in this cycle."
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - enhancement
      - feature
  patch:
    labels:
      - bug
      - docs
      - chore
      - refactor
      - test
  default: patch

categories:
  - title: "Features"
    labels:
      - enhancement
      - feature
  - title: "Fixes"
    labels:
      - bug
  - title: "Documentation"
    labels:
      - docs
  - title: "Maintenance"
    labels:
      - chore
      - refactor
      - test
